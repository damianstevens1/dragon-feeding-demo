<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dragon Sprite Preview</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #eef5ee; color: #17302a; }
      main { max-width: 1120px; margin: 0 auto; padding: 24px; }
      h1 { margin: 0 0 16px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
      .card { padding: 14px; border: 1px solid #a8b9a9; border-radius: 8px; background: #fffffa; }
      h2 { margin: 0 0 10px; font-size: 20px; }
      img { width: 100%; image-rendering: auto; background: linear-gradient(45deg, #dce7dc 25%, transparent 25% 75%, #dce7dc 75%), linear-gradient(45deg, #dce7dc 25%, transparent 25% 75%, #dce7dc 75%); background-size: 24px 24px; background-position: 0 0, 12px 12px; }
      p { margin: 10px 0 0; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <h1>Dragon Sprite Preview</h1>
      <img src="./contact-sheet.png" alt="Dragon sprite contact sheet">
      <div class="grid">
      <article class="card">
        <h2>idle</h2>
        <img src="./idle.png" alt="idle sprite sheet">
        <p>4 frames, 444x444 each</p>
      </article>
      <article class="card">
        <h2>blink</h2>
        <img src="./blink.png" alt="blink sprite sheet">
        <p>4 frames, 444x444 each</p>
      </article>
      <article class="card">
        <h2>happy-bounce</h2>
        <img src="./happy-bounce.png" alt="happy-bounce sprite sheet">
        <p>4 frames, 444x444 each</p>
      </article>
      <article class="card">
        <h2>eat-crunch</h2>
        <img src="./eat-crunch.png" alt="eat-crunch sprite sheet">
        <p>4 frames, 444x444 each</p>
      </article>
      <article class="card">
        <h2>funky-dance</h2>
        <img src="./funky-dance.png" alt="funky-dance sprite sheet">
        <p>12 frames, 444x444 each</p>
      </article>
      <article class="card">
        <h2>fire-breath</h2>
        <img src="./fire-breath.png" alt="fire-breath sprite sheet">
        <p>4 frames, 444x444 each</p>
      </article>
      </div>
    </main>
  </body>
</html>
