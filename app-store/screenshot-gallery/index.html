<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dragon Feeding Game App Store Screenshots</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7f3;
        color: #10201d;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 6vw, 56px);
        line-height: 1.02;
      }

      p {
        margin: 0 0 22px;
        color: #3b5650;
        font-size: 17px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        padding: 12px;
        background: #ffffff;
        border: 1px solid #dfe7df;
        border-radius: 14px;
        box-shadow: 0 12px 34px rgba(16, 32, 29, 0.08);
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 10px;
        border: 1px solid #d5ddd4;
      }

      figcaption {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 10px;
        font-weight: 700;
      }

      a {
        color: #00796b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Dragon Feeding Game screenshots</h1>
      <p>Open each image, then save it to Photos for App Store Connect.</p>

      <section class="grid" aria-label="App Store screenshots">
        <figure>
          <a href="/screenshots/iphone-6.9/01-start.png">
            <img src="/screenshots/iphone-6.9/01-start.png" alt="Dragon Feeding Game start screen" />
          </a>
          <figcaption>
            <span>1. Start screen</span>
            <a href="/screenshots/iphone-6.9/01-start.png">Open</a>
          </figcaption>
        </figure>

        <figure>
          <a href="/screenshots/iphone-6.9/02-feeding-tray.png">
            <img src="/screenshots/iphone-6.9/02-feeding-tray.png" alt="Dragon Feeding Game feeding tray screen" />
          </a>
          <figcaption>
            <span>2. Feeding tray</span>
            <a href="/screenshots/iphone-6.9/02-feeding-tray.png">Open</a>
          </figcaption>
        </figure>

        <figure>
          <a href="/screenshots/iphone-6.9/03-yes-no-question.png">
            <img src="/screenshots/iphone-6.9/03-yes-no-question.png" alt="Dragon Feeding Game yes or no question screen" />
          </a>
          <figcaption>
            <span>3. Yes/no question</span>
            <a href="/screenshots/iphone-6.9/03-yes-no-question.png">Open</a>
          </figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
